openapi: 3.0.3
info:
  title: Task Management API
  description: API for creating fully formed tasks directly in Task Management.
  version: 1.0.0
servers:
  - url: /
    description: Local development server
paths:
  /tasks:
    get:
      summary: Retrieve tasks
      description: Retrieve tasks filtered by case ID and/or task types.
      operationId: getTasks
      parameters:
        - name: ServiceAuthorization
          in: header
          required: true
          description: Service-to-service authorization token
          schema:
            type: string
        - name: case_id
          in: query
          required: false
          description: CCD case reference.
          schema:
            type: string
        - name: task_types
          in: query
          required: false
          description: List of task type identifiers.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: false
      responses:
        '200':
          description: Tasks retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTasksResponse'
        '400':
          description: Validation errors
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

    post:
      summary: Create a new task
      description: Create fully formed tasks directly in Task Management without relying on Camunda or DMN evaluation.
      operationId: createTask
      parameters:
        - name: ServiceAuthorization
          in: header
          required: true
          description: Service-to-service authorization token
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResource'
        '204':
          description: Task already exists for the same external_task_id and case_type_id.
        '400':
          description: Validation errors
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /tasks/terminate:
    post:
      summary: Terminate tasks in bulk
      description: >
        Cancel or complete tasks directly in Task Management. Termination is idempotent per task_id and action;
        repeating the same request for an already-terminated task returns 204 No Content.
      operationId: terminateTasks
      parameters:
        - name: ServiceAuthorization
          in: header
          required: true
          description: Service-to-service authorization token
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminateTasksRequest'
      responses:
        '204':
          description: Tasks terminated successfully or already terminated.
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: One or more task IDs do not exist.

  /tasks/reconfigure:
    put:
      summary: Reconfigure tasks for a case
      description: >
        Replace tasks for a case using service-evaluated rules. Accepts a list of task reconfiguration payloads for the
        target case.
      operationId: reconfigureTasks
      parameters:
        - name: ServiceAuthorization
          in: header
          required: true
          description: Service-to-service authorization token
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskReconfigureRequest'
      responses:
        '200':
          description: Tasks reconfigured successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskReconfigureResponse'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

components:
  schemas:
    PermissionTypes:
      type: string
      enum:
        - Read
        - Own
        - Execute
        - Manage
        - Cancel
        - Refer
        - Complete
        - CompleteOwn
        - CancelOwn
        - Claim
        - Unclaim
        - Assign
        - Unassign
        - UnclaimAssign
        - UnassignClaim
        - UnassignAssign

    ExecutionType:
      type: string
      enum:
        - Manual
        - Built In
        - Case Management Task

    SecurityClassification:
      type: string
      enum:
        - PUBLIC
        - PRIVATE
        - RESTRICTED

    TaskSystem:
      type: string
      enum:
        - SELF
        - CTSC

    TerminationAction:
      type: string
      enum:
        - cancel
        - complete
      description: Termination action.

    TerminateTasksRequest:
      type: object
      required:
        - action
        - task_ids
      properties:
        action:
          $ref: '#/components/schemas/TerminationAction'
        task_ids:
          type: array
          description: List of task IDs to terminate.
          minItems: 1
          uniqueItems: true
          items:
            type: string
            format: uuid

    CreateTaskRequest:
      required:
        - task
      type: object
      properties:
        task:
          allOf:
            - $ref: '#/components/schemas/TaskPayload'
            - type: object
              required:
                - external_task_id
                - type
                - name
                - created
                - execution_type
                - case_id
                - case_type_id
                - jurisdiction
                - work_type
                - role_category
                - security_classification
                - due_date_time
                - permissions
                - case_category
                - case_name
                - region
                - location
    TaskPermission:
      type: object
      required:
        - role_name
        - permissions
      properties:
        role_name:
          type: string
          pattern: '.*\S.*'
          description: Role name.
        role_category:
          type: string
          pattern: '.*\S.*'
          description: Role category.
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/PermissionTypes'
        authorisations:
          type: array
          items:
            type: string
          description: Authorisations for the role.
        assignment_priority:
          type: integer
          description: Assignment priority.
        auto_assignable:
          type: boolean
          description: Whether the role is auto-assignable.
    TaskPayload:
      type: object
      properties:
        external_task_id:
          type: string
          format: uuid
          description: External task identifier.
        id:
          type: string
          format: uuid
          description: Task Management task identifier.
        type:
          type: string
          pattern: '.*\S.*'
          description: Service-defined task type identifier.
        name:
          type: string
          pattern: '.*\S.*'
          description: User-facing task name.
        title:
          type: string
          description: Optional display title.
        assignee:
          type: string
          description: Initial Assignee IDAM ID.
        created:
          type: string
          format: date-time
          description: Creation timestamp.
        execution_type:
          $ref: '#/components/schemas/ExecutionType'
        case_id:
          type: string
          pattern: '.*\S.*'
          description: CCD case reference.
        case_type_id:
          type: string
          pattern: '.*\S.*'
          description: CCD case type identifier.
        case_category:
          type: string
          pattern: '.*\S.*'
          description: Primary case management category.
        case_name:
          type: string
          pattern: '.*\S.*'
          description: Human-readable case name.
        jurisdiction:
          type: string
          pattern: '.*\S.*'
          description: CCD jurisdiction identifier.
        region:
          type: string
          pattern: '.*\S.*'
          description: Case management region identifier.
        location:
          type: string
          pattern: '.*\S.*'
          description: Base location identifier.
        work_type:
          type: string
          pattern: '.*\S.*'
          description: Work type identifier.
        role_category:
          type: string
          description: Role category for the task.
        security_classification:
          $ref: '#/components/schemas/SecurityClassification'
        description:
          type: string
          description: Task description text.
        due_date_time:
          type: string
          format: date-time
          description: Target due date/time.
        priority_date:
          type: string
          format: date-time
          description: Business priority date/time.
        major_priority:
          type: integer
          description: Major priority level.
        minor_priority:
          type: integer
          description: Minor priority level.
        location_name:
          type: string
          description: Location display name.
        region_name:
          type: string
          description: Region display name.
        task_system:
          $ref: '#/components/schemas/TaskSystem'
        next_hearing_date:
          type: string
          format: date-time
          description: Next Hearing date/time.
        next_hearing_id:
          type: string
          description: Next Hearing Id.
        additional_properties:
          type: object
          additionalProperties: true
          description: Free-form metadata.
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/TaskPermission'
    GetTasksResponse:
      type: object
      required:
        - tasks
        - total_records
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/GetTaskResponseItem'
        total_records:
          type: integer
          format: int64
    GetTaskResponseItem:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the task.
        name:
          type: string
          description: Name of the task assigned in the process model.
        assignee:
          type: string
          description: IDAM ID of the assigned user.
        type:
          type: string
          description: Unique identifier for the conceptual business task.
        task_state:
          type: string
          description: unconfigured, unassigned, configured, assigned, referred, completed, cancelled.
        task_system:
          $ref: '#/components/schemas/TaskSystem'
        security_classification:
          $ref: '#/components/schemas/SecurityClassification'
        task_title:
          type: string
          description: Task title to display in task list UI.
        created_date:
          type: string
          format: date-time
          description: Task creation timestamp.
        due_date:
          type: string
          format: date-time
          description: Task due date/time.
        location_name:
          type: string
          description: Location display name.
        location:
          type: string
          description: Base location identifier.
        execution_type:
          $ref: '#/components/schemas/ExecutionType'
        jurisdiction:
          type: string
          description: CCD jurisdiction identifier.
        region:
          type: string
          description: Case management region identifier.
        case_type_id:
          type: string
          description: CCD case type identifier.
        case_id:
          type: string
          description: CCD case reference.
        case_category:
          type: string
          description: Primary case management category.
        case_name:
          type: string
          description: Human-readable case name.
        auto_assigned:
          type: boolean
          description: Whether the task was auto-assigned.
        warnings:
          type: boolean
          description: Whether warning(s) are applied to the task.
        case_management_category:
          type: string
          description: Case management category for the task.
        work_type_id:
          type: string
          description: Work type identifier.
        work_type_label:
          type: string
          description: Work type display label.
        description:
          type: string
          description: Task description text.
        role_category:
          type: string
          description: Role category for the task.
        additional_properties:
          type: object
          description: Additional properties map.
          additionalProperties:
            type: string
        next_hearing_id:
          type: string
          description: Next hearing identifier.
        next_hearing_date:
          type: string
          format: date-time
          description: Next hearing date/time.
        minor_priority:
          type: integer
          description: Minor priority value.
        major_priority:
          type: integer
          description: Major priority value.
        priority_date:
          type: string
          format: date-time
          description: Priority date/time.
        reconfigure_request_time:
          type: string
          format: date-time
          description: Reconfigure request timestamp.
        last_reconfiguration_time:
          type: string
          format: date-time
          description: Last reconfiguration timestamp.
        termination_process:
          type: string
          description: Termination process marker.
    TaskReconfigurePayload:
      type: object
      required:
        - work_type
        - due_date_time
        - permissions
        - case_category
        - case_name
        - region
        - location
        - role_category
      description: Task attributes that can be updated during reconfiguration.
      properties:
        id:
          type: string
          format: uuid
          description: Task identifier to reconfigure.
        title:
          type: string
          description: Optional display title.
        case_category:
          type: string
          pattern: '.*\S.*'
          description: Primary case management category.
        case_name:
          type: string
          pattern: '.*\S.*'
          description: Human-readable case name.
        region:
          type: string
          pattern: '.*\S.*'
          description: Case management region identifier.
        location:
          type: string
          pattern: '.*\S.*'
          description: Base location identifier.
        work_type:
          type: string
          pattern: '.*\S.*'
          description: Work type identifier.
        role_category:
          type: string
          description: Role category for the task.
        description:
          type: string
          description: Task description text.
        due_date_time:
          type: string
          format: date-time
          description: Target due date/time.
        priority_date:
          type: string
          format: date-time
          description: Business priority date/time.
        major_priority:
          type: integer
          description: Major priority level.
        minor_priority:
          type: integer
          description: Minor priority level.
        location_name:
          type: string
          description: Location display name.
        next_hearing_date:
          type: string
          format: date-time
          description: Next Hearing date/time.
        next_hearing_id:
          type: string
          description: Next Hearing Id.
        additional_properties:
          type: object
          additionalProperties: true
          description: Free-form metadata.
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/TaskPermission'
    TaskReconfigureRequest:
      type: object
      required:
        - tasks
      properties:
        tasks:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/TaskReconfigurePayload'
          description: Tasks to reconfigure for the case.
    TaskReconfigureResponse:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskResource'
    TaskResource:
      type: object
      properties:
        task_id:
          type: string
          format: uuid
          description: Unique task identifier.
        external_task_id:
          type: string
          format: uuid
          description: external task identifier.
        task_name:
          type: string
          description: Task name.
        task_type:
          type: string
          description: Task type.
        state:
          type: string
          description: Task state.
        case_id:
          type: string
          description: CCD case reference.
        case_type_id:
          type: string
          description: CCD case type identifier.
        jurisdiction:
          type: string
          description: CCD jurisdiction identifier.
        created:
          type: string
          format: date-time
          description: Creation timestamp.
