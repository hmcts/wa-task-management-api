server:
  port: 8087

management:
  endpoint:
    health:
      show-details: "always"
    loggers:
      enabled: false
  endpoints:
    web:
      base-path: /
      exposure:
        include: health, info, prometheus

config:
  privilegedAccessClients: ${TASK_MANAGEMENT_PRIVILEGED_CLIENTS:wa_task_management_api,xui_webapp,ccd_case_disposer}
  exclusiveAccessClients: ${TASK_MANAGEMENT_EXCLUSIVE_CLIENTS:wa_task_management_api,wa_task_monitor,wa_case_event_handler,wa_workflow_api}
  allowedJurisdictions: ${ALLOWED_JURISDICTIONS:ia,wa,sscs,civil,publiclaw,privatelaw,employment,st_cic}
  allowedCaseTypes: ${ALLOWED_CASE_TYPES:asylum,wacasetype,sscs,civil,generalapplication,care_supervision_epo,prlapps,et_englandwales,et_englandwales_listings,et_englandwales_multiple,et_scotland,et_scotland_listings,et_scotland_multiple,et_admin,privatelaw_exceptionrecord,benefit,CriminalInjuriesCompensation}
  taskMandatoryFieldCheckEnabled: ${MANDATORY_TASK_FIELD_CHECK_ENABLED:true}
  taskMandatoryFields: ${MANDATORY_TASK_FIELDS:taskName,taskId,taskType,dueDateTime,state,securityClassification,title,majorPriority,minorPriority,executionTypeCode,caseId,caseTypeId,caseCategory,caseName,jurisdiction,region,location,created,roleCategory,workTypeResource}
  initiationRequestRequiredFields: ${INITIATION_REQUEST_REQUIRED_FIELDS:name,taskType,caseId}
  search:
    defaultMaxResults: 50
  fieldsToExcludeFromTrim: ${FIELDS_TO_EXCLUDE_FROM_TRIM:description,title,caseName}
  dmnConfigFieldsWithInternalDefaults: ${DMN_CONFIG_FIELDS_WITH_INTERNAL_DEFAULTS:title}

core_case_data:
  api:
    url: http://ccd-data-store-api-aat.service.core-compute-aat.internal

camunda:
  url: http://camunda-api-aat.service.core-compute-aat.internal/engine-rest

role-assignment-service:
  url: http://am-role-assignment-service-aat.service.core-compute-aat.internal
  maxResults: ${ROLE_ASSIGNMENT_MAX_RESULTS:50}

security:
  anonymousPaths:
    - "/"
    - "/health"
    - "/health/liveness"
    - "/health/readiness"
    - "/swagger-resources/**"
    - "/swagger-ui/**"
    - "/swagger-ui/index.html"
    - "/v3/**"
    - "/favicon.ico"

auth:
  provider:
    service:
      client:
        baseUrl: http://rpe-service-auth-provider-aat.service.core-compute-aat.internal

idam:
  baseUrl: https://idam-api.aat.platform.hmcts.net
  redirectUrl: https://ia-case-api-aat.service.core-compute-aat.internal/oauth2/callback
  scope: "openid profile roles"
  s2s-auth:
    url: http://rpe-service-auth-provider-aat.service.core-compute-aat.internal
    secret: <s2s_secret>
    name: <s2s_name>
  s2s-authorised:
    services: ${WA_S2S_AUTHORIZED_SERVICES:ccd,ccd_data,ccd_gw,ccd_ps,iac,wa_task_management_api,xui_webapp,wa_task_monitor,camunda_bpm,wa_workflow_api,wa_case_event_handler,ccd_case_disposer,civil_service,sscs}
  api:
    baseUrl: https://idam-api.aat.platform.hmcts.net
  system:
    username: <s2s_user_name>
    password: <s2s_password>

springdoc:
  swagger-ui:
    enabled: true
    operationsSorter: method
  writer-with-order-by-keys: true

replication:
  username: <repl_user>
  password: <repl_password>
  subscriptionUrl: <repl_sub>
primary:
  username: <prim_user>
  password: <prim_password>

spring:
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
  config:
    import: "optional:configtree:/mnt/secrets/wa/"
  application:
    name: WA Task Management
  main:
    allow-bean-definition-overriding: true
  datasource:
    driverClassName: org.postgresql.Driver
    jdbcUrl: jdbc:postgresql://host from secrets:port from secrets/DB name from secrets?sslmode=require
    username: <datasource_user>
    password: <datasource_password>
  datasource-replica:
    driverClassName: org.postgresql.Driver
    jdbcUrl: jdbc:postgresql://hosr from secrets:port from secrets/DB name from secrets?sslmode=require
    username: REPLICATION_USERNAME from secrets
    password: REPLICATION_PASSWORD from secrets
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      naming:
        physical-strategy: io.hypersistence.utils.hibernate.naming.CamelCaseToSnakeCaseNamingStrategy
    properties:
      hibernate:
        query:
          in_clause_parameter_padding: true
        default_schema: DB name from secrets
        dialect: "uk.gov.hmcts.reform.wataskmanagementapi.config.CustomPostgreSQL94Dialect"
        physical_naming_strategy: "org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy"
  flyway:
    enabled: true
    baselineOnMigrate: true
    defaultSchema: cft_task_db
    schemas: cft_task_db
    placeholders:
      dbPrimaryUserName: POSTGRES_USERNAME from secrets
      dbReplicaUserName: REPLICATION_USERNAME from secrets
      dbReaderUserName: DB_READER_USERNAME from secrets
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://idam-web-public.aat.platform.hmcts.net/o/jwks
      client:
        provider:
          oidc:
            issuer-uri: https://idam-web-public.aat.platform.hmcts.net/o
        registration:
          oidc:
            client-id: <client_id>
            client-secret: <client_password>

feign:
  client:
    config:
      default:
        connectTimeout: 30000
        readTimeout: 30000
        loggerLevel: FULL

launchDarkly:
  sdkKey: <sdkKey>
  connectionTimeout: 5000
  socketTimeout: 5000

environment: ${ENVIRONMENT:local}

logging:
  level:
    root: INFO
    uk.gov.hmcts.reform.wataskmanagementapi.clients.*: INFO
    org.zalando.logbook: INFO
    org.testcontainers: INFO
    com.github.dockerjava: INFO

logbook:
  include: /task/**

caffeine:
  timeout:
    duration: 30
    unit: MINUTES
  task-type:
    timeout:
      duration: ${TASK_TYPE_CACHE_TIMEOUT_DURATION:60}
      unit: ${TASK_TYPE_CACHE_TIMEOUT_TIMEUNIT:MINUTES}
  calendar:
    timeout:
      duration: ${CALENDAR_CACHE_TIMEOUT_DURATION:24}
      unit: ${CALENDAR_CACHE_TIMEOUT_TIMEUNIT:HOURS}

bankHolidays:
  api:
    url: "https://www.gov.uk"
